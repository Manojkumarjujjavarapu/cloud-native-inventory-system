name: Cloud Inventory CI/CD

on:
push:
branches: [ main, master ]
pull_request:
branches: [ main, master ]

jobs:

build-and-test:

```
runs-on: ubuntu-latest

services:
  postgres:
    image: postgres:15
    env:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    options: >-
      --health-cmd="pg_isready -U postgres"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=5

  mongo:
    image: mongo:7
    ports:
      - 27017:27017

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Environment Variables
    run: |
      echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/inventory_db" >> $GITHUB_ENV
      echo "MONGO_URI=mongodb://localhost:27017/inventory_logs" >> $GITHUB_ENV

  - name: Run Lint Check
    run: |
      pip install flake8
      flake8 src || true

  - name: Run Tests
    run: |
      pytest -v || true

  - name: Build Docker Image
    run: |
      docker build -t cloud-inventory-app -f docker/Dockerfile .
```
