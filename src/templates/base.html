<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .btn {
            border-radius: 10px;
        }

        .container-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            📦 InventoryPro
        </a>

        <div class="d-flex align-items-center">

            <a href="/" class="btn btn-outline-light me-2">
                Dashboard
            </a>

            <a href="/store" class="btn btn-outline-light me-2">
                Store
            </a>

            <a href="/orders-history" class="btn btn-outline-light me-3">
                Orders
            </a>

            <!-- Auth Section -->
            <div id="navAuthSection">

                <a href="/login" class="btn btn-warning me-2">
                    Login
                </a>

                <a href="/register" class="btn btn-success">
                    Register
                </a>

            </div>

        </div>

    </div>

</nav>


<div class="container mt-4">

    <div class="container-box">

        {% block content %}
        {% endblock %}

    </div>

</div>


<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");
const username = localStorage.getItem("username");

const nav = document.getElementById("navAuthSection");

if (token && nav) {

    nav.innerHTML = `
        <span class="text-white me-3 fw-bold">
            👤 ${username || "User"} (${role})
        </span>
        <button class="btn btn-danger" onclick="logout()">
            Logout
        </button>
    `;
}

function logout() {
    localStorage.clear();
    window.location.href = "/login";
}

</script>

</body>
</html>
