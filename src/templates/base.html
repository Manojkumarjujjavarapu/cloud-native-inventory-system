<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .card:hover {
            transform: translateY(-3px);
            transition: 0.3s;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-box-seam"></i> Inventory Cloud
        </span>

        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/store" class="btn btn-primary btn-sm">Store</a>
            <a href="/orders-history" class="btn btn-outline-light btn-sm">
                Orders
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
