{% extends "base.html" %}

{% block content %}

<!-- Header + Add Product Button -->
<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h2 class="fw-bold">Online Store</h2>
        <p class="text-muted mb-0">Browse products and place orders</p>
    </div>

    <button id="addProductBtn" 
            onclick="location.href='/products/add'"
            class="btn btn-primary shadow"
            style="display:none;">
        ➕ Add Product
    </button>

</div>


<div class="row g-4">

{% for p in products %}

<div class="col-md-4">

    <div class="card shadow h-100 product-card">

        <!-- Product Image -->
        <img src="{{ p.image_url or 'https://picsum.photos/300/200' }}"
             class="card-img-top"
             style="height:220px; object-fit:cover;">

        <div class="card-body text-center d-flex flex-column">

            <!-- Product Name -->
            <h5 class="card-title">{{ p.name }}</h5>

            <!-- Price -->
            <p class="fw-bold text-primary fs-5">
                ₹{{ p.price }}
            </p>

            <!-- Stock -->
            {% if p.inventory %}
            <p class="text-muted">
                Stock: {{ p.inventory.stock }}
            </p>
            {% endif %}

            <!-- Buy Button -->
            <button 
                data-id="{{ p.id }}"
                onclick="buyProduct(this)"
                class="btn btn-success w-100 mt-auto">
                🛒 Buy Now
            </button>

        </div>

    </div>

</div>

{% endfor %}

</div>


<script>

function buyProduct(button) {

    const productId = button.getAttribute("data-id");

    fetch("/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: 1,
            items: [
                {
                    product_id: parseInt(productId),
                    quantity: 1
                }
            ]
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.order_id) {
            alert("✅ Order Created! ID: " + data.order_id);
            location.reload();
        } else {
            alert("❌ " + (data.error || "Failed to create order"));
        }

    })
    .catch(err => {
        alert("⚠️ Error creating order");
        console.error(err);
    });

}

</script>
<script>

    const role = localStorage.getItem("role");
    
    if (role === "admin") {
        document.getElementById("addProductBtn").style.display = "block";
    }
    
    </script>
<script>

    document.addEventListener("DOMContentLoaded", function () {
    
        const role = localStorage.getItem("role");
    
        if (role === "admin") {
            const btn = document.getElementById("addProductBtn");
            if (btn) btn.style.display = "block";
        }
    
    });
    
    </script>

<style>
.product-card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
</style>

{% endblock %}
